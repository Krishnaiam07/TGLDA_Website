<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FSBS Login | Telangana Livestock Development Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a2e0b5c56b.js" crossorigin="anonymous"></script>

    <style>
        :root {
          --green: #0f8a3f;
          --blue: #0077b6;
          --white: #ffffff;
          --text: #222;
        }

        /* Softer gradient background */
        body {
          margin: 0;
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: 'Inter', sans-serif;
          background: linear-gradient(135deg, #e8f9f1 0%, #d6f0ff 100%);
          overflow: hidden;
        }

        /* Light floating glow effect */
        body::before {
          content: '';
          position: absolute;
          width: 200%;
          height: 200%;
          background: radial-gradient(circle, rgba(255,255,255,0.15) 1%, transparent 3%) repeat;
          background-size: 60px 60px;
          animation: moveDots 25s linear infinite;
          pointer-events: none;
        }

        @keyframes moveDots {
          0% { transform: translate(0, 0); }
          100% { transform: translate(-60px, -60px); }
        }

        /* Login Container */
        .login-container {
          background: rgba(255, 255, 255, 0.4);
          backdrop-filter: blur(14px);
          border-radius: 20px;
          box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
          text-align: center;
          padding: 45px 50px;
          width: 360px;
          color: var(--text);
          border: 1px solid rgba(255, 255, 255, 0.4);
          animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .logo {
          width: 70px;
          height: 70px;
          margin-bottom: 14px;
          border-radius: 50%;
          background: rgba(255,255,255,0.3);
          padding: 6px;
          box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
          font-size: 30px;
          font-weight: 700;
          color: var(--green);
          margin-bottom: 6px;
          letter-spacing: 0.5px;
        }

        h2 {
          font-size: 14px;
          color: #333;
          margin-bottom: 25px;
          font-weight: 500;
        }

        .input-group {
          position: relative;
          margin-bottom: 18px;
        }

        input {
          width: 100%;
          padding: 12px 40px 12px 14px;
          border: 1px solid #ccc;
          border-radius: 10px;
          font-size: 15px;
          color: #333;
          outline: none;
          background: rgba(255, 255, 255, 0.9);
          box-sizing: border-box;
          transition: all 0.3s ease;
        }

        input:focus {
          border-color: var(--green);
          box-shadow: 0 0 8px rgba(15, 138, 63, 0.2);
        }

        /* Eye icon for password */
        .toggle-password {
          position: absolute;
          right: 12px;
          top: 50%;
          transform: translateY(-50%);
          cursor: pointer;
          color: #666;
          font-size: 16px;
        }

        /* Remember / Forgot section */
        .options {
          display: flex;
          align-items: center;
          justify-content: space-between;
          font-size: 13px;
          color: #333;
          margin-bottom: 20px;
        }

        .remember {
          display: flex;
          align-items: center;
          gap: 6px;
        }

        .remember input[type="checkbox"] {
          width: 16px;
          height: 16px;
          cursor: pointer;
        }

        .forgot a {
          color: var(--blue);
          text-decoration: none;
          font-weight: 500;
        }

        .forgot a:hover {
          text-decoration: underline;
        }

        /* Buttons */
        button {
          width: 100%;
          padding: 12px;
          background: linear-gradient(90deg, var(--green), var(--blue));
          border: none;
          border-radius: 10px;
          color: var(--white);
          font-size: 16px;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.3s ease;
          box-shadow: 0 5px 15px rgba(15, 138, 63, 0.25);
        }

        button:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 20px rgba(15, 138, 63, 0.35);
        }

        .secondary-btn {
          margin-top: 12px;
          background: rgba(255, 255, 255, 0.6);
          border: 1px solid rgba(15, 138, 63, 0.2);
          color: #111;
          font-weight: 500;
        }

        .secondary-btn:hover {
          background: rgba(255, 255, 255, 0.8);
        }

        /* Footer */
        footer {
          position: absolute;
          bottom: 10px;
          text-align: center;
          width: 100%;
          color: #444;
          font-size: 13px;
        }

        @media (max-width: 420px) {
          .login-container {
            width: 90%;
            padding: 35px 25px;
          }
        }
    </style>
</head>

<body>
<div class="login-container">
    <img src="Tglda.jpg.png" alt="FSBS Logo" class="logo">
    <h1>FSBS</h1>
    <h2>Frozen Semen Bull Station, Karimnagar</h2>

    <div class="input-group">
        <input type="text" id="username" placeholder="Username" />
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password" />
        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
    </div>

    <div class="options">
        <label class="remember">
            <input type="checkbox" id="remember"> Remember me
        </label>
        <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>

    <button onclick="login()">Login</button>
    <button class="secondary-btn" onclick="home()">Back to Home</button>
</div>

<footer>© 2026 Telangana Livestock Development Agency</footer>

<script>
    const togglePassword = document.querySelector("#togglePassword");
    const password = document.querySelector("#password");

    togglePassword.addEventListener("click", function () {
      const type = password.getAttribute("type") === "password" ? "text" : "password";
      password.setAttribute("type", type);
      this.classList.toggle("fa-eye-slash");
    });

    function login() {
    window.location.href = "/dashboard";
}

function home() {
    window.location.href = "/";
}
</script>
</body>
</html>
